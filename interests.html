<button class="myButton1" id="changeBgBtn">Change Background</button>
<script>
    // Array of background image URLs
    const images = [
        "images/Jesko_absolut.png",
    ];

    let currentIndex = 0;

    // Function to change background image
    function changeBackground() {
        try {
            currentIndex = (currentIndex + 1) % images.length; // Loop through images
            document.body.style.backgroundImage = `url('${images[currentIndex]}')`;
        } catch (error) {
            console.error("Error changing background:", error);
        }

    }
    // Set initial background
    document.body.style.backgroundImage = `url('${images[currentIndex]}')`;
    document.body.style.backgroundRepeat = 'no-repeat'
    document.body.style.backgroundSize = 'cover'
    document.body.style.backgroundPosition = 'center'

    // Attach event listener to button
    document.getElementById("changeBgBtn").addEventListener("click", changeBackground);

<script>
    document.getElementById("clearBtn").addEventListener("click", function () {
      try {
        // Remove all text nodes
        document.querySelectorAll("body *").forEach(function (el) {
          // Remove images
          if (el.tagName === "IMG") {
            el.remove();
          } else {
            // Remove only text content, keep the element structure
            el.childNodes.forEach(function (node) {
              if (node.nodeType === Node.TEXT_NODE) {
                node.textContent = "";
              }
            });
          }
        });
      } catch (err) {
        console.error("Error while clearing content:", err);
      }
    });
  </script>
